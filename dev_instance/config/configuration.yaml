homeassistant:
  name: HA Dev
  latitude: 0
  longitude: 0
  elevation: 0
  unit_system: metric
  time_zone: UTC

lovelace:
  mode: yaml
  dashboards:
    goal-tracker:
      mode: yaml
      title: Goal Tracker Dev
      icon: mdi:chart-bar
      show_in_sidebar: true
      filename: dashboards/home.yaml
  resources:
    - url: /local/custom-cards/goal-tracker-card.js
      type: module

input_text:
  goal_tracker_data:
    name: Goal Tracker Data
    max: 32768